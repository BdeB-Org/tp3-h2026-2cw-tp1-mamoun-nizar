<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN Sushi - Avis</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="site-header">
        <a href="index.html" class="logo">
            MN
            <span>SUSHI</span>
        </a>

        <nav>
            <a href="index.html">Accueil</a>
            <a href="produits.html">Menu</a>
            <a href="reservations.html">Réservation</a>
            <a href="avis.html" class="active">Avis</a>
            <a href="utilisateurs.html">Utilisateurs</a>
            <a href="categories.html">Catégories</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Avis des clients</h1>
            <p>
                Consultez et gérez les avis laissés par les clients sur les produits
                du restaurant MN Sushi.
            </p>
        </section>

        <section class="form-card">
            <h2>Ajouter un avis</h2>

            <form id="avis-form">
                <div class="form-group">
                    <label for="note">Note</label>
                    <select id="note" required>
                        <option value="">Choisir</option>
                        <option value="1">1 / 5</option>
                        <option value="2">2 / 5</option>
                        <option value="3">3 / 5</option>
                        <option value="4">4 / 5</option>
                        <option value="5">5 / 5</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="commentaire">Commentaire</label>
                    <textarea id="commentaire" required></textarea>
                </div>

                <div class="form-group">
                    <label for="dateavis">Date de l’avis</label>
                    <input type="date" id="dateavis" required>
                </div>

                <div class="form-group">
                    <label for="utilisateur_idutilisateur">Utilisateur</label>
                    <select id="utilisateur_idutilisateur" required>
                        <option value="">Chargement...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="produit_idproduit">Produit</label>
                    <select id="produit_idproduit" required>
                        <option value="">Chargement...</option>
                    </select>
                </div>

                <button type="submit" class="btn">Ajouter</button>
            </form>

            <p id="avis-message" class="message"></p>
        </section>

        <section class="table-section">
            <h2 class="section-title">Liste des avis</h2>

            <div class="table-actions">
                <button id="reload-avis" class="btn btn-secondary">Actualiser</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Note</th>
                        <th>Commentaire</th>
                        <th>Date</th>
                        <th>Utilisateur</th>
                        <th>Produit</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="avis-body">
                    <tr>
                        <td colspan="7">Chargement des avis...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/avis.js"></script>
</body>

</html>
